# Resolver internal Docker (127.0.0.11) agar Nginx bisa re-resolve IP container secara dinamis
resolver 127.0.0.11 valid=30s;

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name .ory-vault.test;
    return 301 https://$host$request_uri;
}

# SSL Configuration
ssl_certificate /etc/nginx/certs/internal/gateway.crt;
ssl_certificate_key /etc/nginx/certs/internal/gateway.key;
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers HIGH:!aNULL:!MD5;

server {
    listen 443 ssl;
    server_name auth.ory-vault.test;

    location / {
        # Menggunakan variabel memaksa Nginx melakukan re-resolve DNS
        set $upstream_kratos vault-kratos;
        proxy_pass https://$upstream_kratos:4433;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cookie_flags ~.* domain=ory-vault.test;
        
        proxy_ssl_trusted_certificate /etc/nginx/certs/internal_root_ca.crt;
        proxy_ssl_verify on;
        proxy_ssl_server_name on;

        proxy_set_header Cookie $http_cookie;
    }
}

server {
    listen 443 ssl;
    server_name api.ory-vault.test app.ory-vault.test;

    location / {
        set $upstream_oathkeeper vault-oathkeeper;
        proxy_pass http://$upstream_oathkeeper:4455;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header Cookie $http_cookie;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://ory-vault.test' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Cookie' always;
            return 204;
        }
    }
}

server {
    listen 443 ssl;
    server_name ory-vault.test;

    location /admin-api/ {
        set $upstream_oathkeeper vault-oathkeeper;
        proxy_pass http://$upstream_oathkeeper:4455;
        proxy_set_header Host api.ory-vault.test;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
    }

    location /api/ {
        set $upstream_oathkeeper vault-oathkeeper;
        proxy_pass http://$upstream_oathkeeper:4455;
        proxy_set_header Host api.ory-vault.test; # Paksa host ke api agar match rule Oathkeeper
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
    }

    location / {
        set $upstream_ui vault-ui;
        proxy_pass http://$upstream_ui:3000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        proxy_set_header Cookie $http_cookie;
    }
}

server {
    listen 443 ssl;
    server_name mail.ory-vault.test;

    location / {
        set $upstream_mailpit vault-mailpit;
        proxy_pass http://$upstream_mailpit:8025;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        proxy_set_header Cookie $http_cookie;
    }
}
