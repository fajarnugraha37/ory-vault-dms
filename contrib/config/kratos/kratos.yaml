selfservice:
  default_browser_return_url: http://ory-vault.test/
  methods:
    password:
      enabled: true

log:
  level: debug
  format: json

courier:
  smtp:
    connection_uri: smtp://vault-mailpit:1025/?skip_ssl_verify=true
    from_address: noreply@ory-vault.test
    from_name: ORY Vault DMS

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

serve:
  public:
    base_url: http://auth.ory-vault.test/
  admin:
    base_url: http://vault-kratos:4434/

hashers:
  argon2:
    parallelism: 1
    memory: 128MB
    iterations: 2
    salt_length: 16
