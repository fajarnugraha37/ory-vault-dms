selfservice:
  default_browser_return_url: https://ory-vault.test/
  allowed_return_urls:
    - https://ory-vault.test/
    - https://api.ory-vault.test/
    - https://auth.ory-vault.test/
  methods:
    password:
      enabled: true
      config:
        haveibeenpwned_enabled: false
    link:
      enabled: true
    code:
      enabled: true
  flows:
    error:
      ui_url: https://ory-vault.test/auth/error
    settings:
      ui_url: https://ory-vault.test/auth/settings
      privileged_session_max_age: 15m
    recovery:
      enabled: true
      ui_url: https://ory-vault.test/auth/recovery
      use: link
    verification:
      enabled: true
      ui_url: https://ory-vault.test/auth/verification
      after:
        default_browser_return_url: https://ory-vault.test/
    logout:
      after:
        default_browser_return_url: https://ory-vault.test/auth/login
    login:
      ui_url: https://ory-vault.test/auth/login
      lifespan: 10m
    registration:
      lifespan: 10m
      ui_url: https://ory-vault.test/auth/registration
      after:
        password:
          hooks:
            - hook: session

cookies:
  domain: ory-vault.test
  path: /
  same_site: Lax

session:
  cookie:
    domain: ory-vault.test
    path: /
    same_site: Lax
    persistent: true

secrets:
  cookie:
    - secret-cookie-exactly-32-chars-x
  cipher:
    - secret-cipher-exactly-32-chars-x

log:
  level: debug
  format: json

courier:
  smtp:
    connection_uri: smtp://vault-mailpit:1025/?skip_ssl_verify=true&disable_starttls=true
    from_address: noreply@ory-vault.test
    from_name: ORY Vault DMS

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

serve:
  public:
    base_url: https://auth.ory-vault.test
    cors:
      enabled: true
      allowed_origins:
        - https://ory-vault.test
        - https://app.ory-vault.test
        - https://api.ory-vault.test
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Cookie
        - Content-Type
      exposed_headers:
        - Content-Type
        - Set-Cookie
      allow_credentials: true
  admin:
    base_url: http://vault-kratos:4434/

hashers:
  argon2:
    parallelism: 1
    memory: 128MB
    iterations: 2
    salt_length: 16
