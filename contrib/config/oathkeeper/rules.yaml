# --- Health Check ---
- id: "backend-health-rule"
  upstream:
    preserve_host: true
    url: "http://vault-backend:8080"
  match:
    url: "https://<api|ext-api>.ory-vault.test/health"
    methods: ["GET"]
  authenticators:
    - handler: noop
  authorizer:
    handler: allow
  mutators:
    - handler: noop
  errors:
    - handler: json

- id: "backend-public-rule"
  upstream:
    preserve_host: true
    url: "http://vault-backend:8080"
  match:
    url: "https://api.ory-vault.test/public-api/<**>"
    methods: ["GET"]
  authenticators:
    - handler: noop
  authorizer:
    handler: allow
  mutators:
    - handler: noop
  errors:
    - handler: json

# --- First-Party API (UI Usage via api.ory-vault.test) ---
# Authenticator: COOKIE ONLY. No scope check.
- id: "first-party-api-rule"
  upstream:
    preserve_host: true
    url: "http://vault-backend:8080"
  match:
    url: "https://api.ory-vault.test/api/<**>"
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
  authenticators:
    - handler: cookie_session
  authorizer:
    handler: allow
  mutators:
    - handler: id_token
  errors:
    - handler: json

- id: "first-party-admin-rule"
  upstream:
    preserve_host: true
    url: "http://vault-backend:8080"
  match:
    url: "https://api.ory-vault.test/admin-api/<**>"
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
  authenticators:
    - handler: cookie_session
  authorizer:
    handler: allow
  mutators:
    - handler: id_token
  errors:
    - handler: json

# --- Third-Party API (External Apps via ext-api.ory-vault.test) ---
# Authenticator: OAUTH2 ONLY. Enforces scopes.
- id: "third-party-api-rule"
  upstream:
    preserve_host: true
    url: "http://vault-backend:8080"
  match:
    url: "https://ext-api.ory-vault.test/api/<**>"
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
  authenticators:
    - handler: oauth2_introspection
  authorizer:
    handler: allow
  mutators:
    - handler: id_token
  errors:
    - handler: json

# --- OAuth2 Flow Bridge (Used during Login/Consent) ---
- id: "oauth2-flow-bridge-rule"
  upstream:
    preserve_host: true
    url: "http://vault-backend:8080"
  match:
    url: "https://api.ory-vault.test/api/oauth2/<(login|consent)><**>"
    methods: ["GET"]
  authenticators:
    - handler: noop
  authorizer:
    handler: allow
  mutators:
    - handler: noop
  errors:
    - handler: json
