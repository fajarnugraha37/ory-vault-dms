- id: "backend-health-rule"
  upstream:
    preserve_host: true
    url: "http://vault-backend:8080"
  match:
    url: "http://{api,app}.ory-vault.test/health"
    methods: ["GET"]
  authenticators:
    - handler: noop
  authorizers:
    - handler: allow
  mutators:
    - handler: noop

- id: "backend-api-rule"
  upstream:
    preserve_host: true
    url: "http://vault-backend:8080"
  match:
    url: "http://{api,app}.ory-vault.test/<**>"
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
  authenticators:
    - handler: cookie_session
  authorizers:
    - handler: allow
  mutators:
    - handler: header
  errors:
    - handler: json
