- id: "backend-health-rule"
  upstream:
    preserve_host: true
    url: "http://vault-backend:8080"
  match:
    url: "https://<**>.ory-vault.test/health"
    methods: ["GET"]
  authenticators:
    - handler: noop
  authorizer:
    handler: allow
  mutators:
    - handler: noop
  errors:
    - handler: json

- id: "backend-api-rule"
  upstream:
    preserve_host: true
    url: "http://vault-backend:8080"
  match:
    url: "https://<**>.ory-vault.test/api/<**>"
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
  authenticators:
    - handler: cookie_session
  authorizer:
    handler: allow
  mutators:
    - handler: id_token
  errors:
    - handler: json
