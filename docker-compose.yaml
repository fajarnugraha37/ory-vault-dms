services:
  vault-db:
    image: postgres:16-alpine
    container_name: vault-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=ory_vault
      - POSTGRES_USER=ory
      - POSTGRES_PASSWORD=vault-pass
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./contrib/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ory-network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ory -d ory_vault"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G

  vault-kratos:
    image: oryd/kratos:v1.1
    container_name: vault-kratos
    restart: unless-stopped
    depends_on:
      vault-db:
        condition: service_healthy
      vault-kratos-certs:
        condition: service_completed_successfully
    ports:
      - "4433:4433" # public (HTTPS)
    environment:
      - DSN=postgres://ory:vault-pass@vault-db:5432/ory_vault?sslmode=disable&search_path=kratos
      - SERVE_PUBLIC_TLS_CERT_PATH=/etc/config/kratos/certs/kratos.crt
      - SERVE_PUBLIC_TLS_KEY_PATH=/etc/config/kratos/certs/kratos.key
      - SERVE_TRUSTED_PROXIES=172.16.0.0/12,10.0.0.0/8,127.0.0.1/32
    volumes:
      - ./contrib/config/kratos:/etc/config/kratos
      - internal-certs:/etc/config/kratos/certs:ro
    command: serve -c /etc/config/kratos/kratos.yaml --dev
    networks:
      - ory-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4434/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  vault-kratos-courier:
    image: oryd/kratos:v1.1
    container_name: vault-kratos-courier
    restart: unless-stopped
    depends_on:
      vault-db:
        condition: service_healthy
    environment:
      - DSN=postgres://ory:vault-pass@vault-db:5432/ory_vault?sslmode=disable&search_path=kratos
    command: courier watch -c /etc/config/kratos/kratos.yaml
    volumes:
      - ./contrib/config/kratos:/etc/config/kratos
    networks:
      - ory-network
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep \"kratos courier watch\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 128M

  vault-keto:
    image: oryd/keto:v0.11
    container_name: vault-keto
    restart: unless-stopped
    depends_on:
      vault-db:
        condition: service_healthy
    ports:
      - "4466:4466" # read
      - "4467:4467" # write
    environment:
      - DSN=postgres://ory:vault-pass@vault-db:5432/ory_vault?sslmode=disable&search_path=keto
    volumes:
      - ./contrib/config/keto:/etc/config/keto
    command: serve -c /etc/config/keto/keto.yaml
    networks:
      - ory-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4466/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  vault-oathkeeper:
    image: oryd/oathkeeper:v0.40
    container_name: vault-oathkeeper
    restart: unless-stopped
    depends_on:
      vault-kratos:
        condition: service_healthy
    environment:
      - SSL_CERT_FILE=/etc/config/oathkeeper/root_ca.crt
    ports:
      - "4455:4455" # proxy
      - "4456:4456" # api
    volumes:
      - ./contrib/config/oathkeeper:/etc/config/oathkeeper
      - ./contrib/config/oathkeeper/root_ca.crt:/etc/config/oathkeeper/root_ca.crt:ro
    command: serve -c /etc/config/oathkeeper/oathkeeper.yaml
    networks:
      - ory-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4456/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M

  vault-hydra:
    image: oryd/hydra:v2.2
    container_name: vault-hydra
    restart: unless-stopped
    depends_on:
      vault-db:
        condition: service_healthy
    ports:
      - "4444:4444" # public
      - "4445:4445" # admin
    environment:
      - DSN=postgres://ory:vault-pass@vault-db:5432/ory_vault?sslmode=disable&search_path=hydra
    volumes:
      - ./contrib/config/hydra:/etc/config/hydra
    command: serve -c /etc/config/hydra/hydra.yaml all --dev
    networks:
      - ory-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4445/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  vault-gateway:
    image: nginx:alpine
    container_name: vault-gateway
    restart: unless-stopped
    depends_on:
      vault-oathkeeper:
        condition: service_healthy
      vault-kratos:
        condition: service_healthy
      vault-ui:
        condition: service_healthy
      vault-storage:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./contrib/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./step-ca-data/certs/root_ca.crt:/etc/nginx/certs/internal_root_ca.crt:ro
      - internal-certs:/etc/nginx/certs/internal:ro
    networks:
      - ory-network
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && pgrep nginx || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  vault-gateway-certs:
    image: smallstep/step-cli
    container_name: vault-gateway-certs
    user: root
    depends_on:
      vault-ca:
        condition: service_healthy
    networks:
      - ory-network
    volumes:
      - internal-certs:/certs
      - ./step-ca-data:/home/step:ro
    environment:
      - PW=vault-ca-secret-password-123
    command: >
      sh -c "echo $$PW > /tmp/pw && 
      step ca certificate \"OryVault Gateway\" /certs/gateway.crt /certs/gateway.key 
      --san ory-vault.test 
      --san auth.ory-vault.test 
      --san api.ory-vault.test 
      --san app.ory-vault.test 
      --san mail.ory-vault.test 
      --ca-url https://vault-ca:9000 
      --root /home/step/certs/root_ca.crt 
      --provisioner-password-file /tmp/pw 
      --password-file /tmp/pw 
      --force && 
      chmod 644 /certs/gateway.crt /certs/gateway.key"
    healthcheck:
      test: ["CMD-SHELL", "ls /certs/gateway.crt || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M

  vault-backend:
    build:
      context: ./dms-backend
    container_name: vault-backend
    restart: unless-stopped
    depends_on:
      vault-db:
        condition: service_healthy
      vault-keto:
        condition: service_healthy
      vault-storage:
        condition: service_healthy
    environment:
      - DSN=postgres://ory:vault-pass@vault-db:5432/ory_vault?sslmode=disable&search_path=enterprise
      - JWKS_URL=http://vault-oathkeeper:4456/.well-known/jwks.json
      - KRATOS_ADMIN_URL=http://vault-kratos:4434
      - STORAGE_ENDPOINT=vault-storage:9000
      - STORAGE_ACCESS_KEY=ory-admin
      - STORAGE_SECRET_KEY=vault-storage-pass
      - KETO_READ_URL=vault-keto:4466
      - KETO_WRITE_URL=vault-keto:4467
    networks:
      - ory-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  vault-ui:
    build:
      context: ./dms-ui
    container_name: vault-ui
    restart: unless-stopped
    networks:
      - ory-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

  vault-storage:
    image: minio/minio
    container_name: vault-storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=ory-admin
      - MINIO_ROOT_PASSWORD=vault-storage-pass
    volumes:
      - ./storage-data:/data
    networks:
      - ory-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "9001:9001"
    deploy:
      resources:
        limits:
          memory: 512M

  vault-mailpit:
    image: axllent/mailpit
    container_name: vault-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025" # Web UI
      - "1025:1025" # SMTP
    networks:
      - ory-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025/api/v1/info || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M

  vault-ca:
    image: smallstep/step-ca:latest
    container_name: vault-ca
    restart: unless-stopped
    environment:
      - DOCKER_STEPCA_INIT_NAME=OryVaultCA
      - DOCKER_STEPCA_INIT_PROVISIONER_NAME=admin
      - DOCKER_STEPCA_INIT_PASSWORD=vault-ca-secret-password-123
      - DOCKER_STEPCA_INIT_DNS_NAMES=vault-ca,localhost
    volumes:
      - ./step-ca-data:/home/step
    networks:
      - ory-network
    healthcheck:
      test: ["CMD", "step", "ca", "health", "--ca-url", "https://localhost:9000", "--root", "/home/step/certs/root_ca.crt"]
      interval: 5s
      timeout: 5s
      retries: 3

  vault-kratos-certs:
    image: smallstep/step-cli
    container_name: vault-kratos-certs
    user: root
    depends_on:
      vault-ca:
        condition: service_healthy
    networks:
      - ory-network
    volumes:
      - internal-certs:/certs
      - ./step-ca-data:/home/step:ro
    environment:
      - PW=vault-ca-secret-password-123
    command: sh -c "echo $$PW > /tmp/pw && step ca certificate vault-kratos /certs/kratos.crt /certs/kratos.key --ca-url https://vault-ca:9000 --root /home/step/certs/root_ca.crt --provisioner-password-file /tmp/pw --password-file /tmp/pw --force && chmod 644 /certs/kratos.crt /certs/kratos.key"

networks:
  ory-network:
    driver: bridge

volumes:
  internal-certs: {}
