services:
  vault-db:
    image: postgres:16-alpine
    container_name: vault-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=ory_vault
      - POSTGRES_USER=ory
      - POSTGRES_PASSWORD=vault-pass
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./contrib/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ory-network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ory -d ory_vault"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G

  vault-kratos:
    image: oryd/kratos:v1.1
    container_name: vault-kratos
    restart: unless-stopped
    depends_on:
      vault-db:
        condition: service_healthy
    ports:
      - "4433:4433" # public
      - "4434:4434" # admin
    environment:
      - DSN=postgres://ory:vault-pass@vault-db:5432/ory_vault?sslmode=disable&search_path=kratos
    volumes:
      - ./contrib/config/kratos:/etc/config/kratos
    command: serve -c /etc/config/kratos/kratos.yaml --dev
    networks:
      - ory-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4434/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  vault-keto:
    image: oryd/keto:v0.11
    container_name: vault-keto
    restart: unless-stopped
    depends_on:
      vault-db:
        condition: service_healthy
    ports:
      - "4466:4466" # read
      - "4467:4467" # write
    environment:
      - DSN=postgres://ory:vault-pass@vault-db:5432/ory_vault?sslmode=disable&search_path=keto
    volumes:
      - ./contrib/config/keto:/etc/config/keto
    command: serve -c /etc/config/keto/keto.yaml
    networks:
      - ory-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4466/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  vault-oathkeeper:
    image: oryd/oathkeeper:v0.40
    container_name: vault-oathkeeper
    restart: unless-stopped
    depends_on:
      vault-kratos:
        condition: service_healthy
    ports:
      - "4455:4455" # proxy
      - "4456:4456" # api
    volumes:
      - ./contrib/config/oathkeeper:/etc/config/oathkeeper
    command: serve -c /etc/config/oathkeeper/oathkeeper.yaml
    networks:
      - ory-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4456/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M

  vault-hydra:
    image: oryd/hydra:v2.2
    container_name: vault-hydra
    restart: unless-stopped
    depends_on:
      vault-db:
        condition: service_healthy
    ports:
      - "4444:4444" # public
      - "4445:4445" # admin
    environment:
      - DSN=postgres://ory:vault-pass@vault-db:5432/ory_vault?sslmode=disable&search_path=hydra
    volumes:
      - ./contrib/config/hydra:/etc/config/hydra
    command: serve -c /etc/config/hydra/hydra.yaml all --dev
    networks:
      - ory-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4445/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  vault-gateway:
    image: nginx:alpine
    container_name: vault-gateway
    restart: unless-stopped
    depends_on:
      vault-oathkeeper:
        condition: service_healthy
      vault-kratos:
        condition: service_healthy
      vault-ui:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./contrib/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - ory-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 128M

  vault-backend:
    build:
      context: ./dms-backend
    container_name: vault-backend
    restart: unless-stopped
    depends_on:
      vault-db:
        condition: service_healthy
      vault-keto:
        condition: service_healthy
    networks:
      - ory-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  vault-ui:
    build:
      context: ./dms-ui
    container_name: vault-ui
    restart: unless-stopped
    networks:
      - ory-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

  vault-mailpit:
    image: axllent/mailpit
    container_name: vault-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025" # Web UI
      - "1025:1025" # SMTP
    networks:
      - ory-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025/api/v1/info || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  ory-network:
    driver: bridge
